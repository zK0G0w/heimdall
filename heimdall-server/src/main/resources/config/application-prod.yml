--- ### Sa-Token 扩展配置
sa-token.extension:
  # 安全配置：排除（放行）路径配置
  security.excludes:
    - /error
    # 静态资源
    - /*.html
    - /*/*.html
    - /*/*.css
    - /*/*.js
    - /websocket/**
    # 本地存储资源
    - /file/**
    # Well-Known 路径（浏览器/客户端自动探测）
    - /.well-known/**
    # OAuth2 JWKS 端点
    - /oauth2/jwks

--- ### Snail Job 配置
snail-job:
  enabled: true
  ## 服务端配置（任务调度中心）
  server:
    # 服务端地址
    host: ${SCHEDULE_HOST:127.0.0.1}
    # 服务端通讯端口
    port: ${SCHEDULE_PORT:17888}
    # API 配置
    api:
      # URL
      url: http://127.0.0.1:8001/snail-job
      # 用户名
      username: ${SCHEDULE_USERNAME:admin}
      # 密码
      password: ${SCHEDULE_PASSWORD}
  ## OpenAPI 配置
  openapi:
    # 服务端 Web 端口（默认：8080，如果你部署的服务端改动了端口，这里也需要对应改动）
    # heimdall-extension/heimdall-extension-schedule-server
    port: 18001
  # 客户端地址（默认：自动推断。必须确保服务端可以访问到，在服务端无法调度客户端时需要手动配置）
  #host: 127.0.0.1
  # 客户端端口（默认：17889）
  port: 17889
  # 命名空间
  namespace: ${SCHEDULE_NAMESPACE:764d604ec6fc45f68cd92514c40e9e1a}
  # 接入组名
  group: ${SCHEDULE_GROUP:heimdall}
  # 接入组 token
  token: ${SCHEDULE_TOKEN}
